<svg width="100%" viewBox="0 0 680 792" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Arquitectura bi-selfservice-agents</title>
<desc>Sistema multi-agente en cinco niveles: superficies de consumo, orquestador, especialistas core, enrutador de entregables y subcuadrilla de formatos, todos sobre la Looker API. Proporciones basadas en la razón áurea: cajas con razón phi o phi al cuadrado y anchos en progresión Fibonacci.</desc>
